# Differential-testing fixtures for the pure-ALC fragment of rustdl.
#
# Each entry pins:
#   file        ‚Äî fixture filename, relative to this directory
#   description ‚Äî one-line summary of what the fixture exercises
#   test_class  ‚Äî IRI of the named class whose satisfiability is checked
#   expected    ‚Äî "sat" if the test_class is satisfiable, "unsat" otherwise
#
# An oracle (e.g. ROBOT + HermiT via `docker/robot/oracle.sh`) and a
# rustdl driver should both produce a verdict for each fixture and agree
# with `expected`.
#
# All fixtures are pure ALC: no inverse roles, no cardinality, no
# nominals, no datatypes. They cover the rule set landed in Phase 2
# commits 1-6.

