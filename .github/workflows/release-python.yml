name: Release Python wheels

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  id-token: write    # required for PyPI trusted publisher OIDC
  contents: read

jobs:
  build-wheels:
    name: Build wheels for ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          # Linux aarch64 (ARM64): Docker-on-Apple-Silicon, AWS Graviton
          # / Azure / GCP / Oracle ARM VMs, Raspberry Pi 4/5. Built on a
          # NATIVE GitHub-hosted ARM runner (ubuntu-24.04-arm, GA 2025) —
          # ~4 min, same as x86. The earlier QEMU-emulation approach
          # (build aarch64 on an x86 host) took ~50 min per release;
          # native runners eliminate that. No setup-qemu step needed.
          - os: ubuntu-24.04-arm
            arch: aarch64
          # macOS Intel (macos-13 / x86_64) intentionally dropped:
          # GitHub-hosted Intel Mac runners are heavily oversubscribed
          # (queued > 30 min on the 0.2.0 release attempt). Apple is
          # sunsetting Intel; users on Intel Macs install from sdist
          # (`pip install --no-binary rustdl rustdl`) which compiles
          # from source. Re-add if a customer needs prebuilt Intel.
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: AMD64
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: 'cp310-*'   # abi3 wheel — one build, all 3.10+ Pythons
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: 'build'
          # Manylinux containers ship without Rust; maturin's auto-install
          # via puccinialin breaks on FileNotFoundError. Install rustup
          # explicitly before each wheel build, scoped per-container.
          # macOS / Windows runners already have Rust available; the
          # _LINUX-suffix env vars only apply to Linux jobs.
          #
          # Profile MUST be `default` (not `minimal`): maturin's internal
          # rustup invocation tries to add rustfmt/clippy components,
          # and a `minimal` install conflicts on the cargo-fmt binary
          # ("rustfmt-preview ... detected conflict: 'bin/cargo-fmt'").
          # `default` ships those components from the start, so no
          # subsequent add-component conflict.
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile default
          CIBW_ENVIRONMENT_LINUX: 'PATH=/root/.cargo/bin:$PATH'
          CIBW_BEFORE_BUILD: 'pip install maturin'
          CIBW_TEST_REQUIRES: 'pytest'
          CIBW_TEST_COMMAND: 'pytest {project}/crates/owl-dl-py/tests/python/'
        with:
          package-dir: crates/owl-dl-py
          output-dir: wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install 'maturin>=1.7,<2'
      - name: Build sdist
        working-directory: crates/owl-dl-py
        run: maturin sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          # `maturin sdist` writes to the WORKSPACE target dir, not the
          # per-crate one, in a Cargo workspace. Path is relative to the
          # default working-directory (repo root), so target/wheels/ not
          # crates/owl-dl-py/target/wheels/. `if-no-files-found: error`
          # would have caught the silent-empty-artifact failure that
          # blocked the v0.2.0 first publish attempt.
          path: target/wheels/*.tar.gz
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rustdl/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No password / API token — PyPI trusted publisher OIDC
