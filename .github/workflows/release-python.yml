name: Release Python wheels

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  id-token: write    # required for PyPI trusted publisher OIDC
  contents: read

jobs:
  build-wheels:
    name: Build wheels for ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
          - os: ubuntu-latest
            arch: aarch64
          - os: macos-13
            arch: x86_64
          - os: macos-14
            arch: arm64
          - os: windows-latest
            arch: AMD64
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU (for aarch64 cross-build on x86_64 host)
        if: matrix.arch == 'aarch64'
        uses: docker/setup-qemu-action@v3
      - uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_BUILD: 'cp310-*'   # abi3 wheel — one build, all 3.10+ Pythons
          CIBW_ARCHS: ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND: 'build'
          # Manylinux containers ship without Rust; maturin's auto-install
          # via puccinialin breaks on FileNotFoundError. Install rustup
          # explicitly before each wheel build, scoped per-container.
          # macOS / Windows runners already have Rust available; the
          # _LINUX-suffix env vars only apply to Linux jobs.
          CIBW_BEFORE_ALL_LINUX: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          CIBW_ENVIRONMENT_LINUX: 'PATH=/root/.cargo/bin:$PATH'
          CIBW_BEFORE_BUILD: 'pip install maturin'
          CIBW_TEST_REQUIRES: 'pytest'
          CIBW_TEST_COMMAND: 'pytest {project}/crates/owl-dl-py/tests/python/'
        with:
          package-dir: crates/owl-dl-py
          output-dir: wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install 'maturin>=1.7,<2'
      - name: Build sdist
        working-directory: crates/owl-dl-py
        run: maturin sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: crates/owl-dl-py/target/wheels/*.tar.gz

  publish-pypi:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/rustdl/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: 'wheels-*'
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No password / API token — PyPI trusted publisher OIDC
