# Differential-testing fixtures for the pure-ALC fragment of rustdl.
#
# Each entry pins:
#   file        — fixture filename, relative to this directory
#   description — one-line summary of what the fixture exercises
#   test_class  — IRI of the named class whose satisfiability is checked
#   expected    — "sat" if the test_class is satisfiable, "unsat" otherwise
#
# An oracle (e.g. ROBOT + HermiT via `docker/robot/oracle.sh`) and a
# rustdl driver should both produce a verdict for each fixture and agree
# with `expected`.
#
# All fixtures are pure ALC: no inverse roles, no cardinality, no
# nominals, no datatypes. They cover the rule set landed in Phase 2
# commits 1-6.

[[fixture]]
file = "01_atomic_sat.ofn"
description = "Single atomic class — satisfiable"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "02_and_not_a_unsat.ofn"
description = "A ⊓ ¬A — direct clash"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "03_or_backtrack_sat.ofn"
description = "(A ⊓ ¬A) ⊔ B — first disjunct unsat, search backtracks"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "04_or_all_unsat.ofn"
description = "(A ⊓ ¬A) ⊔ (B ⊓ ¬B) — every branch clashes"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "05_exists_sat.ofn"
description = "∃r.A — exercises ∃-rule"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "06_exists_inner_clash_unsat.ofn"
description = "∃r.(A ⊓ ¬A) — clash propagated through ∃-witness"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "07_forall_clash_unsat.ofn"
description = "∃r.A ⊓ ∀r.¬A — ∀ propagation clashes ∃ witness"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "08_cyclic_blocking_sat.ofn"
description = "A ⊑ ∃r.A; check A — must terminate via subset blocking"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "09_subsumption_chain_unsat.ofn"
description = "A ⊑ B, B ⊑ C; A ⊓ ¬C — chained subsumption"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "10_disjoint_clash_unsat.ofn"
description = "DisjointClasses(A, B); A ⊓ B"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "11_nested_exists_sat.ofn"
description = "∃r.∃r.A — nested ∃ generation, two-deep tree"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "12_mutual_cycle_blocking_sat.ofn"
description = "A ⊑ ∃r.B, B ⊑ ∃r.A — mutual recursion + blocking"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "13_deep_disjunction_sat.ofn"
description = "Four-way ⊔ with three clashing branches; one survives"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "14_residual_gci_unsat.ofn"
description = "⊤ ⊑ A residual GCI clashes with ¬A in the test class"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "15_two_roles_sat.ofn"
description = "∃r.A ⊓ ∃s.B — distinct roles, distinct witnesses"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "16_forall_split_disjunction_sat.ofn"
description = "∃r.A ⊓ ∃r.B ⊓ ∀r.(C ⊔ D) — ⊔ branches at each successor"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "17_three_way_equivalence_sat.ofn"
description = "EquivalentClasses(A, B, C) — multi-way EquivalentClasses normalization"
test_class = "http://rustdl.test/Test"
expected = "sat"

[[fixture]]
file = "18_diamond_subsumption_unsat.ofn"
description = "Diamond A ⊑ B, A ⊑ C, D ≡ B ⊓ C; A ⊓ ¬D unsat"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "19_concept_rule_then_clash_unsat.ofn"
description = "A ⊑ ∃r.B; A ⊓ ∀r.¬B — ConceptRule fires then clashes at ∃ witness"
test_class = "http://rustdl.test/Test"
expected = "unsat"

[[fixture]]
file = "20_double_negation_sat.ofn"
description = "¬¬A — exercises NNF pre-pass"
test_class = "http://rustdl.test/Test"
expected = "sat"
