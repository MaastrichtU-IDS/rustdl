name: CI

on:
  # push trigger disabled 2026-05-29 until the org Actions billing is
  # restored — every recent push has failed with "the job was not
  # started because recent account payments have failed or your
  # spending limit needs to be increased." PRs and manual dispatch
  # still trigger CI normally.
  # push:
  #   branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # owl-dl-py is a PyO3 `cdylib`; building it via plain `cargo` links it
      # as an ordinary lib, which fails on macOS (undefined `_PyExc_*` symbols
      # — Python symbols resolve at runtime, not at link). It is built and
      # tested by the dedicated `pytest` (maturin) job on every platform and
      # compile-checked by the clippy job, so exclude it from this matrix.
      - run: cargo build --workspace --all-targets --exclude owl-dl-py
      - run: cargo test --workspace --all-targets --exclude owl-dl-py
      - run: cargo test --workspace --doc --exclude owl-dl-py

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  soundness-diff:
    name: closure-diff soundness net (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # NOTE: fixtures must be provisioned by the runner (large, gitignored).
      # This job documents the entrypoint; provisioning is out of Phase 0 scope.
      - run: ./scripts/run-soundness-diff.sh
