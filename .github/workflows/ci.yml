name: CI

on:
  # Push trigger re-enabled 2026-06-11: the repo is now public, so GitHub
  # Actions runs on free public-repo minutes (the 2026-05-29 disable was a
  # private-repo billing failure, since resolved). PRs and manual dispatch
  # also trigger CI.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: short

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned toolchain (keep `toolchain:` in sync with rust-toolchain.toml).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, pinned
        with:
          toolchain: "1.95.0"
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned toolchain (keep `toolchain:` in sync with rust-toolchain.toml).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, pinned
        with:
          toolchain: "1.95.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  build-and-test:
    name: build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      # Pinned toolchain (keep `toolchain:` in sync with rust-toolchain.toml).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, pinned
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      # owl-dl-py is a PyO3 `cdylib`; building it via plain `cargo` links it
      # as an ordinary lib, which fails on macOS (undefined `_PyExc_*` symbols
      # — Python symbols resolve at runtime, not at link). It is built and
      # tested by the dedicated `pytest` (maturin) job on every platform and
      # compile-checked by the clippy job, so exclude it from this matrix.
      - run: cargo build --workspace --all-targets --exclude owl-dl-py
      - run: cargo test --workspace --all-targets --exclude owl-dl-py
      - run: cargo test --workspace --doc --exclude owl-dl-py

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --workspace

  soundness-diff:
    name: closure-diff soundness net (manual)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Pinned toolchain (keep `toolchain:` in sync with rust-toolchain.toml).
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master, pinned
        with:
          toolchain: "1.95.0"
      - uses: Swatinem/rust-cache@v2
      # NOTE: fixtures must be provisioned by the runner (large, gitignored).
      # This job documents the entrypoint; provisioning is out of Phase 0 scope.
      - run: ./scripts/run-soundness-diff.sh
